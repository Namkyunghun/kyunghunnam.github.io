  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1050" cy="120" r="180" fill="rgba(96,165,250,0.12)" />
  <circle cx="180" cy="520" r="220" fill="rgba(167,139,250,0.10)" />
  <rect x="82" y="82" width="126" height="126" rx="32" fill="url(#accent)" />
